replicaCount: 3

image:
  repository: bastianbretagne/sosafe-dummy-app
  pullPolicy: IfNotPresent
  tag: "0.0.2"

podAnnotations:
  ad.datadoghq.com/app.checks: |
    {
        "openmetrics": {
            "init_config": {},
            "instances": [
                {
                    "openmetrics_endpoint": "http://%%host%%:%%port%%/metrics",
                    "namespace": "app",
                    "metrics": [".*"]
                }
            ]
        }
    }

securityContext:
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  privileged: false

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    cpu: "200m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "256Mi"

autoscaling:
  enabled: false
  minReplicas: 4
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
