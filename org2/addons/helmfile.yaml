environments:
  default:
    kubeContext: arn:aws:eks:eu-central-1:841602633529:cluster/tech-assessment-cluster

repositories:
  - name: stable
    url: https://charts.helm.sh/stable
  - name: jetstack
    url: https://charts.jetstack.io  
  - name: argocd
    url: https://argoproj.github.io/argo-helm
  - name: sealed-secrets
    url: https://bitnami-labs.github.io/sealed-secrets
  - name: "kubernetes-incubator"
    url: "https://charts.helm.sh/incubator"

releases:
  - chart: ingress-nginx/ingress-nginx
    namespace: nginx
    name: nginx
    version: ~4.10.0
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: ~1.14.0
    set:
      - name: installCRDs
        value: true
    values:
      - extraArgs:
          - --dns01-recursive-nameservers-only
          - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
  - name: post-init
    namespace: cert-manager
    chart: ./post-init
  - name: external-dns
    namespace: kube-system
    chart: bitnami/external-dns
    version: 7.5.0
    values:
      - sources:
        - service
        - ingress
        - pod
  - name: sealed-secrets-controller
    namespace: kube-system
    chart: sealed-secrets/sealed-secrets
    version: 2.11.0
  - name: sealed-secrets-key
    namespace: kube-system
    chart: "kubernetes-incubator/raw"
    needs: ['kube-system/sealed-secrets-controller']
    version: "0.2.3"
    wait: true
    timeout: 120
    cleanupOnFail: true
    values:
      - resources:
        - apiVersion: v1
          data:
            tls.crt: 
            tls.key: 
          kind: Secret
          metadata:
            labels:
              sealedsecrets.bitnami.com/sealed-secrets-key: active
            name: sealed-secrets-key
            namespace: kube-system
          type: kubernetes.io/tls
  - name: repository-creds-argocd-declarative
    namespace: argocd
    chart: "kubernetes-incubator/raw"
    needs: ['kube-system/sealed-secrets-controller']
    version: "0.2.3"
    wait: true
    timeout: 120
    cleanupOnFail: true
    values:
      - resources:
        - apiVersion: bitnami.com/v1alpha1
          kind: SealedSecret
          metadata:
            annotations:
              sealedsecrets.bitnami.com/cluster-wide: "true"
            name: repository-creds.argocd-declarative
            namespace: argocd
          spec:
            encryptedData:
              password: 
              type: 
              url: 
              username: 
            template:
              data: null
              metadata:
                annotations:
                  sealedsecrets.bitnami.com/cluster-wide: "true"
                labels:
                  argocd.argoproj.io/secret-type: repository
                name: repository-creds.argocd-declarative
                namespace: argocd
              type: Opaque
