argo-cd:
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false
  server:
    extraArgs:
      - --insecure
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostname: "argocd.emzien.click"
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
