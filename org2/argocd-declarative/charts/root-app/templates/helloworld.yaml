apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.com/zeeshan30/argocd-declarative.git
    path: charts/helloworld
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: helloworld
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
